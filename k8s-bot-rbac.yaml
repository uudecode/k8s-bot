apiVersion: v1
kind: ServiceAccount
metadata:
  name: telegram-monitor-bot
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: monitor-bot-role
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: monitor-bot-binding
subjects:
  - kind: ServiceAccount
    name: telegram-monitor-bot
    namespace: default
roleRef:
  kind: ClusterRole
  name: monitor-bot-role
  apiGroup: rbac.authorization.k8s.io
